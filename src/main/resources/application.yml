spring:
  config:
    import: external-apis.yml
  profiles:
    active:  ${PROFILE:dev}
  application:
    name: orchestrator
server:
  port: 8081
  servlet:
    context-path: /workflows
http:
  connection:
    read-timeout: 50000
    server-connect-timeout: 4000
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [TRACE-ID=%X{traceId}] %msg%n"






